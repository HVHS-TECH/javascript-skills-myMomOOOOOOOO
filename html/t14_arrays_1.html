<body>
  <h1>T14-arrays part 1</h1>

  <p>Open the console <code>(Ctrl-shift-i)</code> to see the messages.</p>

  <p><br><br><i>Copy your HTML from the last task and keep building.</i><br><br><br><br></p>

  <!-- Age and money form -->
  <form onsubmit="updateInfo(); return false;">

    <label for="ageInput">Enter your age:</label>
    <input type="number" id="ageInput">

    <br><br>

    <label for="moneyInput">Enter your pocket money:</label>
    <input type="number" id="moneyInput">

    <br><br>

    <button type="submit">Submit</button>

  </form>

  <br><br>

  <!-- Chocolate array form -->
  <form onsubmit="showChocolateMessage(); return false;">

    <label>On a scale of 0-3 how much do you like chocolate?</label>

    <input type="number" id="chocolateInput" min="0" max="3">

    <button type="submit">Submit</button>

  </form>

  <div id="spaceForJavaScriptOutput">

    The output of your script will go here.

  </div>

  <script src="../t14_arrays_1.js"></script>

</body>
